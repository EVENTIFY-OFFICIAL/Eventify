<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar Sesión Proveedor - Eventify</title>

<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Bodoni Moda', serif;
color:#1A334A;
position:relative;
}

/* FONDO */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:linear-gradient(135deg,#EAF2F5 0%,#8ca0ab 40%,#627782 100%);
z-index:-2;
}

body::after{
content:"";
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 30%, rgba(30,83,110,0.08), transparent 60%),
radial-gradient(circle at 80% 70%, rgba(93,186,194,0.38), transparent 60%);
z-index:-1;
}

/* BOTÓN REGRESAR */
.back{
position:absolute;
top:25px;
left:25px;
padding:8px 16px;
border-radius:30px;
background:rgba(255,255,255,0.4);
backdrop-filter:blur(6px);
text-decoration:none;
color:#1A334A;
font-weight:600;
transition:0.3s;
}

.back:hover{
background:linear-gradient(135deg,#4a7f9a,#1A334A);
color:white;
}

/* CONTENEDOR */
.container{
width:100%;
max-width:420px;
padding:40px;
text-align:center;
}

.logo img{
max-width:180px;
margin-bottom:25px;
}

h1{
margin-bottom:30px;
font-weight:600;
}

/* INPUTS */
input{
width:100%;
padding:15px;
margin-bottom:20px;
border-radius:40px;
border:1px solid #C9DDE6;
font-family:'Bodoni Moda', serif;
outline:none;
}

input:focus{
border-color:#1E536E;
}

/* PASSWORD */
.password-container{
position:relative;
}

.password-container input{
padding-right:45px;
}

.toggle-password{
position:absolute;
right:15px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
opacity:0.6;
}

.toggle-password:hover{
opacity:1;
}

/* BOTÓN */
.button{
width:100%;
padding:18px;
border-radius:50px;
border:none;
cursor:pointer;
transition:0.3s ease;
background:linear-gradient(135deg,#4a7f9ac5,#1A334A);
color:white;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
margin-top:10px;
}

.button:hover{
transform:translateY(-3px);
background:linear-gradient(135deg,#1A334A,#4a7f9ac5);
}

/* ERROR */
.error{
color:#c0392b;
font-size:14px;
margin-top:10px;
display:none;
}

/* LINKS */
.link{
margin-top:20px;
font-size:14px;
}

.link a{
color:#1E536E;
text-decoration:none;
font-weight:600;
}

/* TÉRMINOS */
.terms{
margin-top:15px;
font-size:12px;
opacity:0.75;
}

.terms a{
text-decoration:underline;
color:#1A334A;
font-weight:600;
}

</style>
</head>

<body>

<a class="back" href="index.html">← Regresar</a>

<div class="container">

<div class="logo">
<img src="logo-eventify.png" alt="Logo">
</div>

<h1>Iniciar sesión</h1>

<input type="email" id="email" placeholder="Correo electrónico">

<div class="password-container">
<input type="password" id="password" placeholder="Contraseña">
<span class="toggle-password" onclick="togglePassword()">👁</span>
</div>

<div class="error" id="errorMessage"></div>

<button class="button" onclick="login()">
Entrar
</button>

<div class="link">
¿No tienes cuenta? <a href="register-provider.html">Crea una cuenta</a>
</div>

<div class="terms">
Al iniciar sesión aceptas nuestros 
<a href="terminos-proveedor.html">términos y condiciones</a> y 
<a href="privacidad-proveedor.html">política de privacidad</a>.
</div>

</div>

<script>

/* 👁 Mostrar / ocultar contraseña */
function togglePassword(){
const input = document.getElementById("password");
input.type = input.type === "password" ? "text" : "password";
}

/* 🔐 LOGIN */
function login(){

const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value;
const errorMessage = document.getElementById("errorMessage");

errorMessage.style.display = "none";

/* VALIDACIÓN */
if(!email || !password){
errorMessage.textContent = "Ingresa tu correo y contraseña.";
errorMessage.style.display = "block";
return;
}

/* USUARIO GUARDADO */
const storedUser = JSON.parse(localStorage.getItem("providerUser"));

if(!storedUser || storedUser.email !== email || storedUser.password !== password){
errorMessage.textContent = "Correo o contraseña incorrectos.";
errorMessage.style.display = "block";
return;
}

/* GUARDAR SESIÓN */
localStorage.setItem("providerLoggedIn", "true");

/* REDIRECCIÓN */
window.location.href = "home-provedor.html";

}

</script>

</body>
</html>

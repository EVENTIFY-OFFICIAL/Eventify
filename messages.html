<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mensajes - Eventify</title>

<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:'Bodoni Moda', serif;
min-height:100vh;
overflow-x:hidden;
color:#1A334A;
padding:110px 20px 130px;
background:
linear-gradient(rgba(234,242,245,0.86),rgba(234,242,245,0.86)),
url('https://images.unsplash.com/photo-1511578314322-379afb476865?q=80&w=1600&auto=format&fit=crop');
background-size:cover;
background-position:center;
background-attachment:fixed;
position:relative;
}

/* BLURS */

.bg-blur{
position:fixed;
border-radius:50%;
filter:blur(90px);
opacity:0.35;
z-index:-1;
}

.blur1{
width:320px;
height:320px;
background:white;
top:-100px;
right:-80px;
}

.blur2{
width:280px;
height:280px;
background:#9fb9c7;
bottom:0;
left:-80px;
}

/* SCROLL */

::-webkit-scrollbar{
width:8px;
}

::-webkit-scrollbar-thumb{
background:#1A334A;
border-radius:20px;
}

/* HEADER */

.header{
max-width:1200px;
margin:auto;
margin-bottom:35px;
text-align:center;
}

.header h1{
font-size:52px;
margin-bottom:12px;
font-weight:700;
}

.header p{
max-width:700px;
margin:auto;
line-height:1.8;
font-size:15px;
opacity:0.85;
}

/* BACK */

.back-btn{
position:fixed;
top:25px;
left:20px;
z-index:100;
background:rgba(255,255,255,0.7);
backdrop-filter:blur(12px);
padding:12px 18px;
border-radius:30px;
text-decoration:none;
color:#1A334A;
font-size:14px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
transition:0.3s;
}

.back-btn:hover{
transform:translateY(-2px);
background:#1A334A;
color:white;
}

/* SEARCH */

.search-container{
max-width:1200px;
margin:auto;
margin-bottom:25px;
}

.search-box{
width:100%;
padding:18px 24px;
border:none;
outline:none;
border-radius:30px;
font-size:15px;
font-family:'Bodoni Moda', serif;
background:rgba(255,255,255,0.72);
backdrop-filter:blur(10px);
box-shadow:0 10px 30px rgba(0,0,0,0.08);
transition:0.3s;
}

.search-box:focus{
transform:translateY(-2px);
}

/* FILTERS */

.filters{
display:flex;
gap:14px;
overflow-x:auto;
padding-bottom:10px;
margin-top:18px;
}

.filters::-webkit-scrollbar{
display:none;
}

.filter-btn{
padding:12px 20px;
border:none;
border-radius:30px;
background:rgba(255,255,255,0.7);
backdrop-filter:blur(10px);
cursor:pointer;
font-family:'Bodoni Moda', serif;
white-space:nowrap;
transition:0.3s;
box-shadow:0 5px 15px rgba(0,0,0,0.06);
}

.filter-btn.active{
background:#1A334A;
color:white;
}

/* CHATS */

.chat-list{
max-width:1200px;
margin:auto;
display:flex;
flex-direction:column;
gap:18px;
}

.chat-item{
background:rgba(255,255,255,0.62);
backdrop-filter:blur(16px);
border-radius:32px;
padding:20px;
display:flex;
align-items:center;
justify-content:space-between;
cursor:pointer;
transition:0.35s;
box-shadow:0 15px 35px rgba(0,0,0,0.08);
animation:fadeUp .5s ease;
position:relative;
overflow:hidden;
}

.chat-item:hover{
transform:translateY(-4px);
}

.chat-left{
display:flex;
align-items:center;
gap:18px;
flex:1;
min-width:0;
}

.avatar{
width:72px;
height:72px;
border-radius:50%;
object-fit:cover;
box-shadow:0 8px 20px rgba(0,0,0,0.12);
}

.chat-info{
display:flex;
flex-direction:column;
min-width:0;
}

.chat-name{
font-size:20px;
font-weight:600;
margin-bottom:6px;
display:flex;
align-items:center;
gap:8px;
}

.online-dot{
width:10px;
height:10px;
border-radius:50%;
background:#4CAF50;
}

.chat-last{
font-size:14px;
opacity:0.75;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
max-width:500px;
}

.chat-right{
display:flex;
flex-direction:column;
align-items:flex-end;
gap:10px;
margin-left:20px;
}

.time{
font-size:12px;
opacity:0.65;
}

.unread-badge{
min-width:26px;
height:26px;
padding:0 8px;
border-radius:30px;
background:#1A334A;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
}

/* EMPTY */

.empty-state{
max-width:600px;
margin:70px auto 0;
text-align:center;
display:none;
background:rgba(255,255,255,0.45);
backdrop-filter:blur(18px);
padding:45px 30px;
border-radius:35px;
box-shadow:0 15px 35px rgba(0,0,0,0.08);
}

.empty-state h2{
margin-top:20px;
margin-bottom:12px;
}

.empty-state p{
line-height:1.8;
opacity:0.8;
margin-bottom:20px;
}

.empty-btn{
padding:14px 24px;
border:none;
border-radius:30px;
background:#1A334A;
color:white;
cursor:pointer;
font-family:'Bodoni Moda', serif;
transition:0.3s;
}

.empty-btn:hover{
transform:translateY(-2px);
}

/* NAVBAR IOS */

.navbar{
position:fixed;
bottom:18px;
left:50%;
transform:translateX(-50%);
width:92%;
max-width:700px;
background:rgba(255,255,255,0.8);
backdrop-filter:blur(14px);
display:flex;
justify-content:space-around;
padding:18px 0;
border-radius:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.12);
z-index:100;
overflow-x:auto;
gap:18px;
padding:18px 20px;
}

.navbar a{
transition:0.3s;
}

.navbar a:hover{
transform:translateY(-3px) scale(1.05);
}

.navbar a svg{
width:24px;
height:24px;
stroke:#1A334A;
stroke-width:1.7;
fill:none;
transition:0.3s;
}

.navbar a:hover svg{
stroke:#4a7f9a;
}

/* TOP BUTTON */

.top-btn{
position:fixed;
right:25px;
bottom:100px;
width:52px;
height:52px;
border:none;
border-radius:50%;
background:#1A334A;
color:white;
font-size:20px;
cursor:pointer;
display:none;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
transition:0.3s;
z-index:99;
}

.top-btn:hover{
transform:translateY(-4px);
}

/* ANIMATIONS */

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* MOBILE */

@media(max-width:768px){

.header h1{
font-size:38px;
}

.chat-item{
padding:18px;
}

.avatar{
width:60px;
height:60px;
}

.chat-name{
font-size:17px;
}

.chat-last{
max-width:180px;
}

}

</style>
</head>

<body>

<div class="bg-blur blur1"></div>
<div class="bg-blur blur2"></div>

<a href="home-organizador.html" class="back-btn">
← Regresar
</a>

<!-- HEADER -->

<div class="header">

<h1>Mensajes</h1>

<p>
Conversa con tus proveedores, coordina detalles
y mantén toda la organización de tus eventos
en un solo lugar.
</p>

</div>

<!-- SEARCH -->

<div class="search-container">

<input
type="text"
class="search-box"
id="searchInput"
placeholder="Buscar conversación..."
>

<div class="filters">

<button class="filter-btn active"
onclick="filterChats('Todos',event)">
Todos
</button>

<button class="filter-btn"
onclick="filterChats('No leídos',event)">
No leídos
</button>

<button class="filter-btn"
onclick="filterChats('Favoritos',event)">
Favoritos
</button>

</div>

</div>

<!-- CHAT LIST -->

<div class="chat-list" id="chatList"></div>

<!-- EMPTY -->

<div class="empty-state" id="emptyState">

<h2>No tienes conversaciones ✨</h2>

<p>
Explora proveedores premium y comienza
a planear experiencias inolvidables.
</p>

<button class="empty-btn"
onclick="window.location.href='search-providers.html'">

Buscar proveedores

</button>

</div>

<!-- TOP BUTTON -->

<button class="top-btn" id="topBtn">
↑
</button>

<!-- NAVBAR -->

<div class="navbar">

<!-- CREAR EVENTO -->

<a href="create-event.html" title="Crear evento">

<svg viewBox="0 0 24 24">
<circle cx="12" cy="12" r="9"/>
<line x1="12" y1="8" x2="12" y2="16"/>
<line x1="8" y1="12" x2="16" y2="12"/>
</svg>

</a>

<!-- BUSCAR -->

<a href="search-providers.html" title="Buscar proveedores">

<svg viewBox="0 0 24 24">
<circle cx="11" cy="11" r="7"/>
<line x1="20" y1="20" x2="16.5" y2="16.5"/>
</svg>

</a>

<!-- MENSAJES -->

<a href="messages.html" title="Mensajes">

<svg viewBox="0 0 24 24">
<path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/>
</svg>

</a>

<!-- PRESUPUESTO -->

<a href="Presupuesto.html" title="Presupuesto">

<svg viewBox="0 0 24 24">
<path d="M3 7h18v10H3z"/>
<path d="M16 12h2"/>
<path d="M3 10h18"/>
</svg>

</a>

<!-- PAGOS -->

<a href="Payments.html" title="Pagos">

<svg viewBox="0 0 24 24">
<rect x="3" y="6" width="18" height="12" rx="2"/>
<line x1="3" y1="10" x2="21" y2="10"/>
</svg>

</a>

<!-- PERFIL -->

<a href="profile-organizer.html" title="Perfil">

<svg viewBox="0 0 24 24">
<circle cx="12" cy="8" r="4"/>
<path d="M4 20c0-4 16-4 16 0"/>
</svg>

</a>

<!-- AJUSTES -->

<a href="Ajustes.html" title="Ajustes">

<svg viewBox="0 0 24 24">
<circle cx="12" cy="12" r="3"/>
<path d="M19.4 15a1.7 1.7 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.82-.33 1.7 1.7 0 0 0-1 1.54V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1-1.54 1.7 1.7 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .33-1.82 1.7 1.7 0 0 0-1.54-1H3a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.54-1 1.7 1.7 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.82.33h.01a1.7 1.7 0 0 0 1-1.54V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 1.54 1.7 1.7 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.33 1.82v.01a1.7 1.7 0 0 0 1.54 1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.54 1z"/>
</svg>

</a>

</div>

<script>

/* PROVIDERS */

const providers = [

{
name:"DJ Marco",
avatar:"https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?q=80&w=1200&auto=format&fit=crop",
online:true,
favorite:true
},

{
name:"Salón Jardín Real",
avatar:"https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=400&auto=format&fit=crop",
online:false,
favorite:false
},

{
name:"Catering Deluxe",
avatar:"https://images.unsplash.com/photo-1555244162-803834f70033?q=80&w=400&auto=format&fit=crop",
online:true,
favorite:true
},

{
name:"Fotografía Luna",
avatar:"https://images.unsplash.com/photo-1516035069371-29a1b244cc32?q=80&w=400&auto=format&fit=crop",
online:true,
favorite:false
}

];

/* FAKE CONVERSATIONS */

const fakeChats = {

"DJ Marco":[

{
sender:"provider",
text:"¡Hola! Gracias por contactarme 🎧",
time:"9:12 AM",
read:true
},

{
sender:"me",
text:"Hola Alex, me interesa cotizar DJ para una boda.",
time:"9:14 AM",
read:true
},

{
sender:"provider",
text:"Claro ✨ ¿Para cuántas personas sería el evento?",
time:"9:16 AM",
read:false
}

],

"Salón Jardín Real":[

{
sender:"provider",
text:"Tenemos disponibilidad para mayo y junio 🌿",
time:"Ayer",
read:true
},

{
sender:"me",
text:"Perfecto, ¿me puedes enviar fotos del salón?",
time:"Ayer",
read:true
},

{
sender:"provider",
text:"Sí claro, te las comparto enseguida.",
time:"Ayer",
read:true
}

],

"Catering Deluxe":[

{
sender:"provider",
text:"Nuestro menú gourmet incluye opciones vegetarianas ✨",
time:"11:02 AM",
read:false
},

{
sender:"me",
text:"Excelente, eso me interesa mucho.",
time:"11:05 AM",
read:false
}

],

"Fotografía Luna":[

{
sender:"provider",
text:"Hola 📸 Gracias por escribirnos.",
time:"Lunes",
read:true
},

{
sender:"provider",
text:"Tenemos paquetes con drone y video cinematográfico.",
time:"Lunes",
read:true
},

{
sender:"me",
text:"¡Wow! ¿Me puedes mandar costos?",
time:"Lunes",
read:true
}

]

};

/* SAVE FAKE CHATS FIRST TIME */

providers.forEach(provider=>{

const key =
"chat_" + provider.name.replace(/\s/g,"");

if(!localStorage.getItem(key)){

localStorage.setItem(
key,
JSON.stringify(fakeChats[provider.name] || [])
);

}

});

let currentFilter = "Todos";

const chatList =
document.getElementById("chatList");

function renderChats(){

chatList.innerHTML = "";

const search =
document.getElementById("searchInput")
.value.toLowerCase();

let filtered = providers.filter(provider=>
provider.name.toLowerCase().includes(search)
);

if(currentFilter === "Favoritos"){

filtered = filtered.filter(p=>p.favorite);

}

filtered.forEach(provider=>{

const key =
"chat_" + provider.name.replace(/\s/g,"");

const messages =
JSON.parse(localStorage.getItem(key)) || [];

let lastMessage =
"Sin mensajes aún";

let lastTime = "";

let unread = 0;

if(messages.length > 0){

lastMessage =
messages[messages.length-1].text;

lastTime =
messages[messages.length-1].time;

unread =
messages.filter(
m=>m.sender==="provider" && !m.read
).length;

}

if(currentFilter === "No leídos" && unread === 0){
return;
}

const div =
document.createElement("div");

div.classList.add("chat-item");

div.onclick = ()=>{

window.location.href =
"chat.html?provider=" + provider.name;

};

div.innerHTML = `

<div class="chat-left">

<img
src="${provider.avatar}"
class="avatar"
>

<div class="chat-info">

<div class="chat-name">

${provider.name}

${provider.online
? '<span class="online-dot"></span>'
: ''
}

</div>

<div class="chat-last">

${lastMessage}

</div>

</div>

</div>

<div class="chat-right">

<div class="time">

${lastTime}

</div>

${unread > 0
? `<div class="unread-badge">${unread}</div>`
: ''
}

</div>

`;

chatList.appendChild(div);

});

if(chatList.innerHTML === ""){

document.getElementById("emptyState")
.style.display = "block";

}else{

document.getElementById("emptyState")
.style.display = "none";

}

}

/* FILTERS */

function filterChats(type,e){

currentFilter = type;

document.querySelectorAll(".filter-btn")
.forEach(btn=>btn.classList.remove("active"));

e.target.classList.add("active");

renderChats();

}

/* SEARCH */

document.getElementById("searchInput")
.addEventListener("input",renderChats);

/* TOP BUTTON */

window.addEventListener("scroll",()=>{

if(window.scrollY > 400){

document.getElementById("topBtn")
.style.display = "block";

}else{

document.getElementById("topBtn")
.style.display = "none";

}

});

document.getElementById("topBtn")
.addEventListener("click",()=>{

window.scrollTo({
top:0,
behavior:"smooth"
});

});

/* INIT */

renderChats();

</script>

</body>
</html>

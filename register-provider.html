<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro Proveedor - Eventify</title>

<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

/* BODY CORRECTO */
body{
margin:0;
min-height:100vh;
font-family:'Bodoni Moda', serif;
color:#1A334A;
position:relative;

overflow-y:auto;
overflow-x:hidden;
scrollbar-width:none;
}

/* ocultar scroll */
body::-webkit-scrollbar{
display:none;
}

/* 🔥 TU FONDO ORIGINAL */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(135deg,#EAF2F5 0%,#8ca0ab 40%,#627782 100%);
z-index:-2;
}

body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 30%, rgba(30,83,110,0.08), transparent 60%),
radial-gradient(circle at 80% 70%, rgba(93,186,194,0.35), transparent 60%);
z-index:-1;
}

/* BOTÓN REGRESAR */
.back{
position:fixed;
top:30px;
left:25px;
padding:10px 20px;
border-radius:50px;
background:rgba(255,255,255,0.4);
backdrop-filter:blur(6px);
text-decoration:none;
color:#1A334A;
font-weight:600;
z-index:1000;
}

/* CONTENEDOR (AQUÍ VA EL PADDING) */
.container{
max-width:500px;
margin:auto;
text-align:center;
padding:80px 20px 40px;
}

/* LOGO */
.logo img{
max-width:150px;
margin-bottom:10px;
}

/* INPUTS */
input, textarea{
width:100%;
padding:14px;
margin-bottom:12px;
border-radius:30px;
border:1px solid #C9DDE6;
font-family:'Bodoni Moda', serif;
outline:none;
}

textarea{
border-radius:20px;
height:80px;
}

/* PASSWORD */
.password-container{
position:relative;
}

.toggle-password{
position:absolute;
right:15px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
}

/* FOTO PERFIL */
.preview{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
margin:10px auto;
display:none;
}

/* CHIPS */
.chips{
display:flex;
flex-wrap:wrap;
gap:8px;
justify-content:center;
margin-bottom:10px;
}

.chip{
padding:7px 12px;
border-radius:20px;
border:1px solid #1A334A;
cursor:pointer;
font-size:12px;
}

.chip.active{
background:#1A334A;
color:white;
}

/* BOTÓN */
.button{
width:100%;
padding:15px;
border-radius:50px;
border:none;
background:#1A334A;
color:white;
cursor:pointer;
margin-top:5px;
}

/* ERROR */
.error{
color:red;
font-size:12px;
display:none;
}
</style>
</head>

<body>

<a href="login-provider.html" class="back">← Regresar</a>

<div class="container">

<!-- LOGO -->
<div class="logo">
<img src="logo-eventify.png">
</div>

<h2>Registro de Proveedor</h2>

<form id="form">

<input type="text" id="code" placeholder="Código de proveedor *">

<input type="text" id="company" placeholder="Nombre de empresa (opcional)">

<input type="text" id="name" placeholder="Nombre completo *">
<input type="email" id="email" placeholder="Correo electrónico *">

<div class="password-container">
<input type="password" id="password" placeholder="Contraseña *">
<span class="toggle-password" onclick="toggle('password')">👁</span>
</div>

<div class="password-container">
<input type="password" id="confirm" placeholder="Confirmar contraseña *">
<span class="toggle-password" onclick="toggle('confirm')">👁</span>
</div>

<input type="tel" id="phone" placeholder="Teléfono *">

<p><strong>Tipo de proveedor *</strong></p>

<div class="chips">
<div class="chip">DJ</div>
<div class="chip">Fotografía</div>
<div class="chip">Video</div>
<div class="chip">Banquetes</div>
<div class="chip">Decoración</div>
<div class="chip">Iluminación</div>
<div class="chip">Salón</div>
<div class="chip">Wedding planner</div>
<div class="chip" id="otroBtn">Otro</div>
</div>

<input type="text" id="otroInput" placeholder="Especifica..." style="display:none;">

<input type="text" id="price" placeholder="Rango de precios (Ej. $5,000 - $15,000) *">

<input type="text" id="country" placeholder="País *">
<input type="text" id="city" placeholder="Municipio *">

<p>Foto de perfil (opcional)</p>
<input type="file" id="image" accept="image/*">
<img id="preview" class="preview">
<p style="font-size:11px;">Podrás cambiar tu foto después dentro de la app</p>

<textarea id="desc" placeholder="Descripción *"></textarea>
<textarea id="services" placeholder="Servicios *"></textarea>

<div class="error" id="error"></div>

<button class="button">Registrarse</button>

</form>

</div>

<script>

/* PASSWORD */
function toggle(id){
let i=document.getElementById(id);
i.type=i.type==="password"?"text":"password";
}

/* FOTO */
document.getElementById("image").addEventListener("change", e=>{
const file=e.target.files[0];
if(file){
let img=document.getElementById("preview");
img.src=URL.createObjectURL(file);
img.style.display="block";
}
});

/* CHIPS */
let selected=[];

document.querySelectorAll(".chip").forEach(chip=>{
chip.onclick=function(){

if(this.id==="otroBtn"){
document.getElementById("otroInput").style.display="block";
}

this.classList.toggle("active");

if(selected.includes(this.textContent)){
selected=selected.filter(t=>t!==this.textContent);
}else{
selected.push(this.textContent);
}
}
});

/* REGISTRO */
document.getElementById("form").addEventListener("submit", e=>{
e.preventDefault();

let error=document.getElementById("error");
error.style.display="none";

const code=document.getElementById("code").value.trim();
const name=document.getElementById("name").value.trim();
const email=document.getElementById("email").value.trim();
const pass=document.getElementById("password").value;
const confirm=document.getElementById("confirm").value;
const phone=document.getElementById("phone").value.trim();
const price=document.getElementById("price").value.trim();
const country=document.getElementById("country").value.trim();
const city=document.getElementById("city").value.trim();
const desc=document.getElementById("desc").value.trim();
const services=document.getElementById("services").value.trim();

if(document.getElementById("otroInput").value){
selected.push(document.getElementById("otroInput").value);
}

if(!code||!name||!email||!pass||!confirm||!phone||!price||!country||!city||!desc||!services||selected.length===0){
error.textContent="Completa todos los campos obligatorios.";
error.style.display="block";
return;
}

if(pass!==confirm){
error.textContent="Las contraseñas no coinciden.";
error.style.display="block";
return;
}

const data={
code,name,email,pass,phone,types:selected,price,country,city,desc,services
};

localStorage.setItem("providerUser", JSON.stringify(data));

alert("Registro exitoso 🎉");
window.location.href="home-provedor.html";

});

</script>

</body>
</html>

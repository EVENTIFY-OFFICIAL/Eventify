<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Proveedores - Eventify</title>

<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
font-family:'Bodoni Moda', serif;
color:#1A334A;
padding:110px 20px 160px;
background:
linear-gradient(rgba(234,242,245,0.88),rgba(234,242,245,0.88)),
url('https://images.unsplash.com/photo-1511578314322-379afb476865?q=80&w=1600&auto=format&fit=crop');
background-size:cover;
background-position:center;
background-attachment:fixed;
overflow-x:hidden;
}

/* SCROLL */

::-webkit-scrollbar{
width:8px;
}

::-webkit-scrollbar-thumb{
background:#1A334A;
border-radius:20px;
}

/* BACK */

.back-btn{
position:fixed;
top:25px;
left:20px;
z-index:100;
background:rgba(255,255,255,0.7);
backdrop-filter:blur(12px);
padding:12px 18px;
border-radius:30px;
text-decoration:none;
color:#1A334A;
font-size:14px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
transition:0.3s;
}

.back-btn:hover{
transform:translateY(-2px);
background:#1A334A;
color:white;
}

/* HERO */

.hero{
max-width:1200px;
margin:auto;
margin-bottom:35px;
text-align:center;
}

.hero h1{
font-size:48px;
margin-bottom:12px;
font-weight:700;
}

.hero p{
font-size:16px;
line-height:1.7;
max-width:700px;
margin:auto;
opacity:0.85;
}

/* SEARCH */

.search-container{
max-width:1200px;
margin:auto;
margin-bottom:25px;
}

.search-box{
width:100%;
padding:18px 24px;
border-radius:30px;
border:none;
outline:none;
font-size:15px;
font-family:'Bodoni Moda', serif;
background:rgba(255,255,255,0.72);
backdrop-filter:blur(10px);
box-shadow:0 10px 30px rgba(0,0,0,0.08);
transition:0.3s;
}

.search-box:focus{
transform:translateY(-2px);
}

/* FILTERS */

.filters{
display:flex;
gap:14px;
overflow-x:auto;
padding-bottom:10px;
margin-top:18px;
}

.filters::-webkit-scrollbar{
display:none;
}

.filter-btn{
padding:12px 20px;
border:none;
border-radius:30px;
background:rgba(255,255,255,0.7);
backdrop-filter:blur(10px);
cursor:pointer;
font-family:'Bodoni Moda', serif;
white-space:nowrap;
transition:0.3s;
box-shadow:0 5px 15px rgba(0,0,0,0.06);
}

.filter-btn.active{
background:#1A334A;
color:white;
}

/* TABS */

.tabs{
max-width:1200px;
margin:auto;
display:flex;
gap:14px;
margin-bottom:30px;
flex-wrap:wrap;
}

.tab{
flex:1;
min-width:180px;
padding:16px;
border-radius:25px;
text-align:center;
cursor:pointer;
background:rgba(255,255,255,0.55);
backdrop-filter:blur(10px);
transition:0.3s;
box-shadow:0 8px 20px rgba(0,0,0,0.06);
}

.tab.active{
background:#1A334A;
color:white;
transform:translateY(-2px);
}

/* PROVIDERS */

.providers-grid{
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
gap:24px;
}

.provider-card{
background:rgba(255,255,255,0.62);
backdrop-filter:blur(14px);
border-radius:35px;
overflow:hidden;
box-shadow:0 15px 35px rgba(0,0,0,0.08);
transition:0.35s;
position:relative;
}

.provider-card:hover{
transform:translateY(-6px);
}

.provider-cover{
position:relative;
height:220px;
overflow:hidden;
}

.provider-cover img{
width:100%;
height:100%;
object-fit:cover;
transition:0.4s;
}

.provider-card:hover .provider-cover img{
transform:scale(1.06);
}

.provider-overlay{
position:absolute;
inset:0;
background:linear-gradient(to top, rgba(0,0,0,0.7), rgba(0,0,0,0.1));
display:flex;
align-items:flex-end;
padding:24px;
color:white;
}

.provider-overlay h3{
font-size:30px;
margin-bottom:6px;
}

.provider-content{
padding:24px;
}

.stars{
color:#b68a20;
font-size:16px;
margin-bottom:18px;
}

.quick-tags{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:22px;
}

.quick-tags span{
padding:10px 14px;
background:white;
border-radius:30px;
font-size:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.06);
}

.provider-description{
font-size:14px;
line-height:1.8;
margin-bottom:22px;
opacity:0.85;
}

/* ACTIONS */

.actions{
display:flex;
align-items:center;
gap:12px;
}

.view-btn{
flex:1;
padding:15px;
border:none;
border-radius:22px;
background:#1A334A;
color:white;
cursor:pointer;
font-family:'Bodoni Moda', serif;
transition:0.3s;
}

.view-btn:hover{
transform:translateY(-2px);
}

.icon-btn{
font-size:28px;
cursor:pointer;
transition:0.3s;
color:#d0d0d0;
}

.icon-btn.heart.active{
color:#ff4d6d;
transform:scale(1.08);
}

.save{
width:28px;
height:28px;
stroke:#c9c9c9;
fill:none;
stroke-width:2;
cursor:pointer;
transition:0.3s;
}

.save.active{
fill:#1A334A;
stroke:#1A334A;
}

/* EMPTY */

.no-results{
text-align:center;
margin-top:60px;
font-size:18px;
display:none;
}

/* NAVBAR IOS */

.navbar{
position:fixed;
bottom:18px;
left:50%;
transform:translateX(-50%);
width:92%;
max-width:700px;
background:rgba(255,255,255,0.8);
backdrop-filter:blur(14px);
display:flex;
justify-content:space-around;
padding:18px 0;
border-radius:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.12);
z-index:100;
overflow-x:auto;
gap:18px;
padding:18px 20px;
}

.navbar a{
transition:0.3s;
}

.navbar a:hover{
transform:translateY(-3px) scale(1.05);
}

.navbar a svg{
width:24px;
height:24px;
stroke:#1A334A;
stroke-width:1.7;
fill:none;
transition:0.3s;
}

.navbar a:hover svg{
stroke:#4a7f9a;
}

/* MOBILE */

@media(max-width:768px){

.hero h1{
font-size:38px;
}

.providers-grid{
grid-template-columns:1fr;
}

.tabs{
flex-direction:column;
}

.tab{
min-width:100%;
}

}

</style>
</head>

<body>

</svg>

<script>

/* LIMPIAR DATOS VIEJOS */
localStorage.removeItem("providers");

/* LINKS */

const correctLinks = {

/* PROVIDERS */

},

{

description:"Planeación completa para bodas y eventos exclusivos con atención personalizada.",

},

{
id:6,

{

description:"Fotografía cinematográfica y capturas emocionales inolvidables.",

},

{

{

description:"Experiencias gastronómicas premium con chefs especializados.",
tags:["Gourmet","Buffet","Chef"],
fav:false,
saved:false,
link:null
}

];

/* FORCE LINKS */

providers.forEach(p=>{

if(correctLinks[p.id]){
p.link = correctLinks[p.id];
}

});

function saveData(){

localStorage.setItem(
"providers",
JSON.stringify(providers)
);

}

function goToProfile(link){

if(link){

window.location.href = link;

}else{

alert("Este perfil aún no está disponible ✨");

}

}

let currentTab = "recomendados";
let currentCategory = "Todos";

function renderProviders(){

const container =
document.getElementById("providersContainer");

const searchValue =
document.getElementById("searchInput")
.value.toLowerCase();

container.innerHTML = "";

let filtered = providers.filter(p=>

p.name.toLowerCase().includes(searchValue)

);

if(currentCategory !== "Todos"){

filtered = filtered.filter(
p=>p.filter===currentCategory
);

}

if(currentTab==="favoritos"){

filtered = filtered.filter(p=>p.fav);

}

if(currentTab==="guardados"){

filtered = filtered.filter(p=>p.saved);

}

if(filtered.length===0){

document.getElementById("noResults")
.style.display = "block";

return;

}else{

document.getElementById("noResults")
.style.display = "none";

}

filtered.forEach(p=>{

container.innerHTML += `

<div class="provider-card">

<div class="provider-cover">

<img src="${p.img}">

<div class="provider-overlay">

<div>

<h3>${p.name}</h3>

<p>${p.category}</p>

</div>

</div>

</div>

<div class="provider-content">

<div class="stars">

${p.rating}
(${p.reviews} reseñas)

</div>

<div class="quick-tags">

${p.tags.map(tag=>`<span>${tag}</span>`).join("")}

</div>

<div class="provider-description">

${p.description}

</div>

<div class="actions">

<button class="view-btn"
onclick="goToProfile('${p.link}')">

Ver perfil

</button>

<span class="icon-btn heart ${p.fav?'active':''}"
onclick="toggleFav(${p.id})">

♥

</span>

<svg class="save ${p.saved?'active':''}"
onclick="toggleSave(${p.id})"
viewBox="0 0 24 24">

<path d="M6 3h12v18l-6-4-6 4z"/>

</svg>

</div>

</div>

</div>

`;

});

}

function toggleFav(id){

const provider =
providers.find(p=>p.id===id);

provider.fav = !provider.fav;

saveData();

renderProviders();

}

function toggleSave(id){

const provider =
providers.find(p=>p.id===id);

provider.saved = !provider.saved;

saveData();

renderProviders();

}

function switchTab(tab,e){

currentTab = tab;

document.querySelectorAll(".tab")
.forEach(t=>t.classList.remove("active"));

e.target.classList.add("active");

renderProviders();

}

function filterCategory(category,e){

currentCategory = category;

document.querySelectorAll(".filter-btn")
.forEach(btn=>btn.classList.remove("active"));

e.target.classList.add("active");

renderProviders();

}

document.getElementById("searchInput")
.addEventListener("input", renderProviders);

renderProviders();

</script>

</body>
